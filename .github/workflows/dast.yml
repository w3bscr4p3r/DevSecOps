name: DAST Scan
on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  dast:
    runs-on: ubuntu-latest
    services:
      app:
        image: nginx:alpine  # Substitua pela sua app
        ports:
          - 80:80
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Start ZAP Baseline
      uses: zaproxy/action-baseline@v0.7.0
      with:
        target: 'http://app:80'
        cmd_options: '-t http://app:80 -J zap-report.json'
    
    - name: Upload ZAP Report
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: zap-baseline.sarif